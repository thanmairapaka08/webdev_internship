<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Listing</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <!-- Navbar -->

    <nav class="navbar">

        <h1 class="logo">Products</h1>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

            <li><a href="todo.html">To-Do</a></li>

        </ul>

    </nav>



    <!-- Products Section -->

    <section class="section">

        <h2>Product Listing</h2>


        <!-- Filter Controls -->

        <div class="controls">

            <select id="filterCategory">

                <option value="all">
                    All Categories
                </option>

                <option value="electronics">
                    Electronics
                </option>

                <option value="fashion">
                    Fashion
                </option>

                <option value="books">
                    Books
                </option>

            </select>



            <select id="sortPrice">

                <option value="default">
                    Sort By
                </option>

                <option value="low">
                    Price: Low to High
                </option>

                <option value="high">
                    Price: High to Low
                </option>

            </select>

        </div>



        <!-- Product Cards -->

        <div
            id="productContainer"
            class="product-container"
        ></div>

    </section>


    <footer>

        <p>
            © 2026 Product Listing Page
        </p>

    </footer>


    <script src="script.js"></script>

</body>

</html>
