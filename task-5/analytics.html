<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <!-- Navbar -->

    <nav class="navbar">

        <h1 class="logo">SubManager</h1>
    
        <ul class="nav-links">
    
            <li><a href="index.html">Home</a></li>
    
            <li><a href="dashboard.html">Dashboard</a></li>
    
            <li><a href="analytics.html">Analytics</a></li>
    
            <li>
                <button
                    class="logout-btn"
                    onclick="logoutUser()"
                >
                    Logout
                </button>
            </li>
    
        </ul>
    
    </nav>



    <!-- Analytics Section -->

    <section class="section">

        <h2>Subscription Analytics</h2>


        <div class="analytics-container">


            <!-- Total Subscriptions -->

            <div class="analytics-card">

                <h3>Total Subscriptions</h3>

                <h1 id="totalSubscriptions">
                    0
                </h1>

            </div>



            <!-- Monthly Spending -->

            <div class="analytics-card">

                <h3>Total Monthly Spending</h3>

                <h1 id="totalAmount">
                    ₹0
                </h1>

            </div>



            <!-- Active Plans -->

            <div class="analytics-card">

                <h3>Active Plans</h3>

                <h1 id="activePlans">
                    0
                </h1>

            </div>

        </div>

    </section>



    <!-- Footer -->

    <footer>

        <p>
            © 2026 Subscription Management System
        </p>

    </footer>


    <script src="script.js"></script>

</body>

</html>
