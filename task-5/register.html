<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <nav class="navbar">

        <h1 class="logo">SubManager</h1>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="auth.html">Login</a></li>

        </ul>

    </nav>



    <section class="auth-section">

        <div class="single-auth-box">

            <h2>Register</h2>


            <input
                type="text"
                id="registerName"
                placeholder="Enter Name"
            >


            <input
                type="email"
                id="registerEmail"
                placeholder="Enter Email"
            >


            <input
                type="password"
                id="registerPassword"
                placeholder="Create Password"
            >


            <button onclick="registerUser()">
                Register
            </button>


            <p class="auth-link">

                Already have an account?

                <a href="auth.html">
                    Login
                </a>

            </p>

        </div>

    </section>



    <footer>

        <p>
            © 2026 Subscription Management System
        </p>

    </footer>


    <script src="script.js"></script>

</body>

</html>
