<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <!-- Navbar -->

    <nav class="navbar">

        <h1 class="logo">SubManager</h1>
    
        <ul class="nav-links">
    
            <li><a href="index.html">Home</a></li>
    
            <li><a href="dashboard.html">Dashboard</a></li>
    
            <li><a href="analytics.html">Analytics</a></li>
    
            <li>
                <button
                    class="logout-btn"
                    onclick="logoutUser()"
                >
                    Logout
                </button>
            </li>
    
        </ul>
    
    </nav>



    <!-- Dashboard Section -->

    <section class="section">

        <h2>Manage Subscriptions</h2>


        <div class="dashboard-container">


            <!-- Add Subscription -->

            <div class="form-box">

                <input
                    type="text"
                    id="subscriptionName"
                    placeholder="Subscription Name"
                >
            
            
                <input
                    type="text"
                    id="subscriptionCategory"
                    placeholder="Category (OTT, Music, etc)"
                >
            
            
                <input
                    type="number"
                    id="subscriptionPrice"
                    placeholder="Monthly Price"
                >
            
            
                <input
                    type="date"
                    id="renewalDate"
                >
            
            
                <button onclick="addSubscription()">
                    Add Subscription
                </button>
            
            </div>


            <!-- Subscription List -->

            <div class="subscription-box">

                <h3>Your Subscriptions</h3>

                <ul id="subscriptionList"></ul>

            </div>

        </div>

    </section>



    <!-- Footer -->

    <footer>

        <p>
            © 2026 Subscription Management System
        </p>

    </footer>


    <script src="script.js"></script>

</body>

</html>
